<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusPal - ADHD专注伙伴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #4a5568;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #718096;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .description {
            background: #f7fafc;
            padding: 20px;
            border-radius: 12px;
            margin: 30px 0;
            text-align: left;
        }

        .description h2 {
            color: #4a5568;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .description p {
            margin-bottom: 10px;
            color: #4a5568;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .feature {
            background: #edf2f7;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .feature h3 {
            color: #4a5568;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .feature p {
            font-size: 0.9rem;
            color: #718096;
        }

        .form-group {
            margin: 30px 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 500;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="email"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .early-bird {
            background: #fff8e1;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #ffc107;
        }

        .early-bird h3 {
            color: #d39e00;
            margin-bottom: 5px;
        }

        .footer {
            margin-top: 30px;
            color: #718096;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .card {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>FocusPal</h1>
            <p class="subtitle">专为ADHD设计的智能陪伴伙伴</p>
            
            <div class="description">
                <h2>你是否经常遇到这些问题？</h2>
                <p>• 明明有很多任务，却总是无法开始</p>
                <p>• 容易分心，专注时间很短</p>
                <p>• 需要外部监督才能完成任务</p>
                <p>• 现有的专注App效果有限</p>
            </div>

            <div class="features">
                <div class="feature">
                    <h3>温和陪伴</h3>
                    <p>不是冷冰冰的监督，而是温暖的伙伴</p>
                </div>
                <div class="feature">
                    <h3>智能提醒</h3>
                    <p>在合适的时间给出合适的鼓励</p>
                </div>
                <div class="feature">
                    <h3>任务分解</h3>
                    <p>把大任务拆解成可执行的小步骤</p>
                </div>
            </div>

            <div class="form-group">
                <label for="email">加入早期测试计划</label>
                <div class="input-group">
                    <input type="email" id="email" placeholder="输入你的邮箱地址" required>
                    <button onclick="submitEmail()">立即加入</button>
                </div>
            </div>

            <div class="early-bird">
                <h3>🎉 早期用户福利</h3>
                <p>前100名注册用户将获得3个月免费专业版使用权！</p>
            </div>

            <p class="footer">我们尊重你的隐私，不会向第三方分享你的信息</p>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="collect-emails.js"></script>
</body>
</html>
